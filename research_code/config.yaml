params:
  zoom_level: 8
  mly_key: "MLY|7528238413968457|ed14c6e38679af952a575dbf5ef5ffcf"
  n_max_rows_parquet: 500000
  urban_threshold: 100
  rural_threshold: 1000
  ghsl_col_1: ".ID_UC_G0"
  ghsl_col_2: ".GC_UCN_MAI_2025"
  africapolis_col_1: ".agglosID"
  africapolis_col_2: ".agglosName"
  earth_radius: 6371008
  distance_threshold: 30
  threshold_1: 10
  threshold_2: 20
  seed: 42

paths:
  data_dir: "../data"
  processed_dir: "{data_dir}/processed"
  starter_dir: "{data_dir}/starter_files"
  tiles_save_dir: "{processed_dir}/tiles"
  completed_tiles_dir: "{processed_dir}/tiles/completed"
  failed_tiles_dir: "{processed_dir}/tiles/failed"
  raw_metadata_dir: "{processed_dir}/mapillary_metadata/raw_metadata"
  splitted_raw_metadata_dir: "{processed_dir}/mapillary_metadata/splitted_raw_metadata"
  tile_partitioned_parquet_raw_metadata_dir: "{processed_dir}/mapillary_metadata/hive_partitioned_raw_metadata"
  unfiltered_metadata_dir: "{processed_dir}/mapillary_metadata/spatial_intersections/intersected_unfiltered_metadata"
  ohsome_osm_dir: ""
  osm_saving_dir: "{data_dir}/osm_data/ohsome_data"
  osm_partitioned_dir: "{data_dir}/osm_data/hive_partitioned_osm_data"
  osm_intersections_dir: "{processed_dir}/mapillary_metadata/spatial_intersections/found_osm_segments"
  osm_nearest_line_dir: "{processed_dir}/mapillary_metadata/spatial_intersections/nearest_lines"
  image_dir: "{data_dir}/images"
  continents_dir: "{starter_dir}/continents"
  final_unfiltered_dir: "{processed_dir}/final_unfiltered_metadata"
  final_filtered_dir: "{processed_dir}/final_filtered_metadata"
  stats_dir: "{processed_dir}/stats"
  
filenames:
  starter_polygon_fn: ""
  continents_filename: "{processed_dir}/continents.parquet"
  overture_url: "s3://overturemaps-us-west-2/release/2025-01-22.0"
  country_filename: "overture_divisions.parquet"
  ghsl_filename: "GHS_UCDB_GLOBE_R2024A.gpkg"
  africapolis_filename: "AFRICAPOLIS2020.shp"

metadata_params:
  retries: 5
  batch_size: 100
  windows: true
  call_limit: 5
  empty_data_attempts: 3
  max_connections: 10000
  sleep_time: 5
  max_workers: 16
  missing_attempts: 1
  updated_after: "2026-03-18T00:49:00"
  query_bbox: [8.657570, 49.392653, 8.707523, 49.420689]
  metadata_basename: "metadata_unfiltered"
  missing_basename: "missing_sequences"
  initial_subdivisions: 100
  subdivision_factor: 4
  enable_download: true
  monitor_interval: 10
  monitor_check_timeout: 10
  write_interval: 300
  write_check_timeout: 10

csv_split_params:
  n_rows: 500000
  split_enabled: true
  updated_after: "2026-03-18T00:49:00"

image_params:
  image_size: [256, 427]
  call_limit: 5
  sleep_time: 5
  allowed_connections: 10000
  max_workers: 16
  batch_size: 1000
  windows: false
  if_metadata: false
  org_save_true: false
  random_seed: 42

metadata_columns:
  - sequence
  - id
  - thumb_original_url
  - long
  - lat
  - computed_geometry
  - height
  - width
  - altitude
  - make
  - model
  - creator
  - is_pano
  - captured_at

# Image download execution configuration
execution:
  mode: sequential  # Execution mode: array (HPC only), sequential (default local), parallel
  num_jobs: 10      # Number of chunks/parallel jobs (default: 10 on HPC, nproc on local)

statistics:
  shared:
    highways: [motorway, trunk, primary, secondary, tertiary, unclassified, residential]
    areas: [urban, rural]
    road_types: [paved, unpaved]
    road_classes:
      motorway: [motorway, motorway_link]
      trunk: [trunk, trunk_link]
      primary: [primary, primary_link]
      secondary: [secondary, secondary_link]
      tertiary: [tertiary, tertiary_link]
      unclassified: [unclassified]
      residential: [residential]

  geographic_layers:
    osm_distance: 15
    pred_distance: 10
    sigma: 1
    score: 0.8
    threshold: 0.3
    max_workers: 8
    data_input_pattern: data_*.parquet
    urban_area_layers:
      - GHS_STAT_UCDB2015MT_GLOBE_R2019A
      - AFRICAPOLIS2020
    urban_area_cols: [ID_HDC_G0, agglosID]

  aggregation:
    urban_layer_cols: [ID_HDC_G0, agglosID]
    memory_limit_gb: 2010
    number_of_cpus: 64
    max_workers: 16
